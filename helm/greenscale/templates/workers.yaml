{{- range .Values.regions }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .serviceName }}
  namespace: {{ include "greenscale.namespace" $ }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      app: {{ .serviceName }}
  template:
    metadata:
      labels:
        app: {{ .serviceName }}
    spec:
      containers:
        - name: worker
          image: {{ include "greenscale.workerImage" $ }}
          imagePullPolicy: {{ $.Values.images.worker.pullPolicy }}
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: REGION_NAME
              value: {{ .name | quote }}
            - name: PROVIDER
              value: {{ .provider | quote }}
            - name: SIMULATED_LATENCY_MS
              value: {{ .simulatedLatencyMs | quote }}
            - name: COLD_START_PROBABILITY
              value: {{ .coldStartProbability | quote }}
            - name: COLD_START_MS
              value: {{ .coldStartMs | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
{{ toYaml $.Values.worker.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .serviceName }}
  namespace: {{ include "greenscale.namespace" $ }}
spec:
  selector:
    app: {{ .serviceName }}
  ports:
    - port: {{ $.Values.worker.service.port }}
      targetPort: 9000
      name: http
---
{{- end }}
