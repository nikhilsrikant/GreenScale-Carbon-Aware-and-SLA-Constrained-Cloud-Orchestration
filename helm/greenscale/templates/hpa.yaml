{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: greenscale-orchestrator-hpa
  namespace: {{ include "greenscale.namespace" . }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: greenscale-orchestrator
  minReplicas: {{ .Values.autoscaling.orchestrator.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.orchestrator.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.orchestrator.targetCPUUtilizationPercentage }}
---
{{- range .Values.regions }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .serviceName }}-hpa
  namespace: {{ include "greenscale.namespace" $ }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .serviceName }}
  minReplicas: {{ $.Values.autoscaling.worker.minReplicas }}
  maxReplicas: {{ $.Values.autoscaling.worker.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.worker.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
