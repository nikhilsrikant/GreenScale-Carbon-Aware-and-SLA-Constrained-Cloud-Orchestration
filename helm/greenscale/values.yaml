namespaceOverride: ""

images:
  orchestrator:
    repository: greenscale-orchestrator
    tag: dev
    pullPolicy: IfNotPresent
  worker:
    repository: greenscale-worker
    tag: dev
    pullPolicy: IfNotPresent

scheduler:
  policy: weighted # weighted, pareto, or rl
  strictSlo: true
  weights:
    latency: "0.45"
    cost: "0.20"
    carbon: "0.25"
    coldStart: "0.10"
  rl:
    epsilon: "0.10"
    learningRate: "0.20"
    discount: "0.0"
    qtablePath: ""

carbon:
  electricityMapsToken: ""
  cacheTtlSeconds: "900"
  apiTimeoutSeconds: "3.0"

regions:
  - name: aws-us-east-1
    provider: aws
    serviceName: aws-worker
    zone: US-MIDA-PJM
    baseLatencyMs: 95
    carbonGco2Kwh: 410
    costPerMillionRequests: 0.22
    coldStartMs: 180
    replicas: 2
    simulatedLatencyMs: "95"
    coldStartProbability: "0.18"
  - name: azure-westus
    provider: azure
    serviceName: azure-worker
    zone: US-CAL-CISO
    baseLatencyMs: 125
    carbonGco2Kwh: 260
    costPerMillionRequests: 0.25
    coldStartMs: 150
    replicas: 2
    simulatedLatencyMs: "125"
    coldStartProbability: "0.10"
  - name: gcp-us-central1
    provider: gcp
    serviceName: gcp-worker
    zone: US-MIDW-MISO
    baseLatencyMs: 80
    carbonGco2Kwh: 520
    costPerMillionRequests: 0.20
    coldStartMs: 120
    replicas: 2
    simulatedLatencyMs: "80"
    coldStartProbability: "0.12"

orchestrator:
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  service:
    port: 9000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

autoscaling:
  enabled: true
  orchestrator:
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 65
  worker:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 65

observability:
  enabled: true
  prometheus:
    image: prom/prometheus:v2.55.1
  grafana:
    image: grafana/grafana:11.3.0
    adminUser: admin
    adminPassword: greenscale
