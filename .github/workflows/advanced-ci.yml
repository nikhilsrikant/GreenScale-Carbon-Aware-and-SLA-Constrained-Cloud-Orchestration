name: GreenScale Advanced CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          pwd
          ls -la
          python --version
          python -c "import sys; print(sys.path)"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r orchestrator/requirements.txt
          python -m pip install pytest pyyaml

      - name: Import smoke test
        run: |
          python -c "import orchestrator; print('orchestrator import OK')"
          python -c "import orchestrator.app.scheduler; print('scheduler import OK')"
          python -c "import orchestrator.app.rl_scheduler; print('rl scheduler import OK')"
          python -c "import orchestrator.app.pareto; print('pareto scheduler import OK')"

      - name: Run scheduler tests
        run: |
          python -m pytest -q tests

      - name: Compile Python sources
        run: |
          python -m compileall orchestrator worker experiments

      - name: Validate Kubernetes YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in Path("k8s").rglob("*.yaml"):
              text = path.read_text(encoding="utf-8")
              docs = list(yaml.safe_load_all(text))
              assert docs, f"{path} is empty"
              print(f"validated {path}")
          PY

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          helm lint ./helm/greenscale

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: false
          tags: greenscale-orchestrator:ci

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: false
          tags: greenscale-worker:ci

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: [test-and-lint, docker-build]
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish orchestrator
        uses: docker/build-push-action@v6
        with:
          context: ./orchestrator
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/greenscale-orchestrator:latest

      - name: Publish worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/greenscale-worker:latest